name: Build Apps
on:
  workflow_dispatch: {}
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: "--win"
            artifact: windows-exe
          - os: macos-latest
            target: "--mac"
            artifact: macos-dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build installer
        run: npm run dist -w apps/desktop -- ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
          if-no-files-found: warn
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build mobile web assets
        run: npm run build -w apps/mobile
      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync android
      - name: Assemble debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
  release:
    needs: [desktop, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          name: Chauhan ERP ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-artifacts/windows-exe/*
            dist-artifacts/macos-dmg/*
            dist-artifacts/android-apk/*
